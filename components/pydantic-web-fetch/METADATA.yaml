# Upstreams that pydantic-ai itself ported the _ssrf.py IP/cloud-metadata tables from.
# H3 hygiene gate (spec §2) RESOLVED in Stage B — result: NONE FOUND (independently authored;
# MIT-only stands). Evidence:
#   - File header + full-file scan: no "Ported from"/"Adapted from"/attribution/external-URL/
#     copyright markers anywhere in _ssrf.py. Imports are stdlib (ipaddress, socket, dataclasses,
#     urllib.parse) + httpx + two sibling pydantic-ai modules only; no URLs referenced.
#   - git log: inconclusive by procedure (the review clone is --depth 1, so history is truncated
#     to a single commit; full authoring history unavailable). No port marker in the available
#     commit subject. Not blocking — the file-content evidence is decisive.
#   - IP-table spot-compare vs OWASP SSRF cheat sheet: pydantic-ai's tables are a strict SUPERSET.
#     OWASP lists only the common subset (169.254.169.254, RFC1918, 127.0.0.0/8, 0.0.0.0/8,
#     ::1/128, 224.0.0.0/4, ff00::/8). pydantic-ai independently adds endpoints OWASP does NOT
#     list — 168.63.129.16 (Azure WireServer), 169.254.170.2/.170.23 (AWS ECS/EKS),
#     100.100.100.200 (Alibaba), 192.0.0.192 (Oracle), 169.254.42.42 (Scaleway), IPv6 metadata
#     (fd00:ec2::254 et al.) — plus RFC-cited reserved ranges (RFC 5737/2544/6598) and a
#     from-scratch RFC 6052/3056/4380/5214 IPv6-transition decoder. Built from primary RFC
#     sources, not a lift from any single third project.
secondary_origins: []   # none found — independently authored; MIT-only stands (see H3 note above)

# PLANNED local modifications — applied in Stage B/C, recorded here ahead of time.
local_modifications:
  # --- Self-containment: inline private helpers (§4), no pydantic-ai dependency ---
  - "Inline run_in_executor (from pydantic_ai._utils): re-implement DNS thread-offload over asyncio.to_thread (NOT a verbatim lift — upstream uses ContextVars + anyio). Keep a module-level patchable name on _vendor._ssrf (tests monkeypatch by string)."
  - "Inline create_async_http_client + get_user_agent (from pydantic_ai.models): ~3-line httpx.AsyncClient(timeout=httpx.Timeout(timeout=..., connect=5), headers={User-Agent: ...}). Preserve the split connect=5 timeout. Keep a module-level patchable name on _vendor._ssrf."
  - "Inline is_text_like_media_type (from pydantic_ai._utils): ~10-line pure-string leaf, copied verbatim into the engine."
  # --- Glue dropped to NODE.md port-note (§3 / §4 / ADR-0001) ---
  - "Drop the 4 pydantic glue symbols (web_fetch_tool(), Tool, ModelRetry, BinaryContent) -> recorded in NODE.md as a <=10-line glue port-note; reconnected against calfkit's live pydantic-ai at port time. No frozen reference/ snapshot."
  # --- §5 streaming restructure (security-critical fork-point) ---
  - "§5 streaming byte-cap restructure of safe_download/engine: move body consumption INSIDE the guard; per-hop `async with client.stream(GET, ...)`; on redirect do not read body + continue (re-validate next hop); on non-redirect consume iter_bytes() with a running total; abort with typed ResponseTooLargeError once total > MAX_FETCH_BYTES = 5*1024*1024 (5 MiB), before decode/markdownify; preserve charset/encoding in the return (no forced UTF-8). This is modified vendored SECURITY code — captured as a patches/ diff if cleanly re-appliable, else a documented fork-point here."
  - "Add neutral first-party @dataclass FetchedBinary(data: bytes, media_type: str) at the engine/node boundary (NOT in _vendor/); replaces upstream BinaryContent (§6)."
  - "Trim the engine (common_tools/web_fetch.py) to its reusable ~95-100 LOC core (content-type gating, markdownify(strip=[img,script,style]), <title> extraction, JSON fencing, binary handling, 50k char cap, Accept: text/markdown)."
  # --- §3.1 by-hand import-rewrite mapping (<=4 files; no scripts/rewrite_imports.py) ---
  - "Import-rewrite (§3.1, by hand): _ssrf.py -> none after inlining (stdlib + httpx only)."
  - "Import-rewrite (§3.1, by hand): engine -> `from pydantic_ai._ssrf import safe_download` => `from calfkit_pydantic_web_fetch._vendor._ssrf import safe_download` (sibling); drop glue imports; inline is_text_like_media_type."
  - "Import-rewrite (§3.1, by hand): tests -> `pydantic_ai._ssrf` / `pydantic_ai.common_tools.web_fetch` => the vendored module paths; keep run_in_executor / create_async_http_client as module-level patchable names on _vendor._ssrf (tests monkeypatch them by string)."
  - "Port-rewrite both test files alongside the §5 restructure: reshape mocks to streaming async context managers (client.stream + async-iterator iter_bytes()); repoint monkeypatch targets; retain per-redirect-hop revalidation coverage on the streaming path; add byte-cap-abort + before-markdownify + non-UTF-8-charset tests."

