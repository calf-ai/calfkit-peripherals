# Provenance for a vendored component (Chromium README.chromium-style schema).
name: <source-name>
homepage: <upstream repo URL>
revision: <commit SHA, pinned>
retrieved: <YYYY-MM-DD>
license: <SPDX id>            # permissive only
license_file: LICENSE
provides: []                  # calfkit tools this component exposes, e.g. [shell, files]
files: []                     # vendored paths / globs
secondary_origins: []         # upstreams the source itself ported code from: {name, license, files}
local_modifications:
  - "Mechanical import rewrite: <pkg>.* -> calfkit_<source>._vendor.<pkg>.*"
