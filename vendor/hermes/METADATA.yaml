# Provenance for the vendored hermes-agent shell, file, web + todo toolsets.
# (Chromium README.chromium-style schema; see ../../docs/project-structure.md)
name: hermes-agent
homepage: https://github.com/NousResearch/hermes-agent
revision: 5a36f76a00cc448948856a5c1b52710aafec264e
retrieved: 2026-06-07
license: MIT
license_file: LICENSE

# calfkit tools this component exposes (over the Kafka contract — see NODE.md):
#   shell:       terminal, process, execute_code
#   files:       read_file, write_file, patch, search_files
#   web_search:  query -> ranked links (env-selected provider: ddgs/brave-free/searxng/tavily)
#   web_extract: URLs -> raw provider content (Tier-0 backend: tavily)
#   todo:        per-session task list Operator (id-keyed; merge/replace; durable Store deferred -- Faust table)
provides: [shell, files, web_search, web_extract, todo]

# Vendored file set = the bounded transitive closure of .py files (with the upstream's
# app-runtime packages treated as a shim boundary). The authoritative list is the
# "verbatim vendor" git commit (`git show --stat`) and design doc §3. High level:
files:
  - "tools/environments/*.py        # backends: local, docker, ssh, modal, managed_modal, daytona, singularity, file_sync, modal_utils"
  - "tools/terminal_tool.py, tools/process_registry.py, tools/code_execution_tool.py"
  - "tools/file_tools.py, tools/file_state.py, tools/file_operations.py, tools/fuzzy_match.py, tools/patch_parser.py"
  - "tools/approval.py, tools/tirith_security.py, tools/path_security.py, tools/registry.py, tools/lazy_deps.py"
  - "tools/interrupt.py, tools/ansi_strip.py, tools/env_passthrough.py, tools/thread_context.py"
  - "tools/tool_backend_helpers.py, tools/tool_output_limits.py, tools/credential_files.py, tools/binary_extensions.py, tools/budget_config.py, tools/managed_tool_gateway.py, tools/__init__.py"
  - "agent/file_safety.py, agent/redact.py, agent/async_utils.py, agent/i18n.py, agent/skill_utils.py"
  - "hermes_constants.py, utils.py"
  - "locales/*.yaml"
  # web_search/web_extract additions — SAME pin (revision unchanged); to vendor in Stage B:
  - "agent/web_search_provider.py        # to vendor in Stage B — WebSearchProvider ABC (search + extract + capability flags)"
  - "agent/web_search_registry.py        # to vendor in Stage B — in-memory register/get_provider; config-resolver vendored whole but dormant (node selects by env, ADR-0002)"
  - "tools/url_safety.py                  # to vendor in Stage B — async_is_safe_url extract-side SSRF guard (fail-closed under {} stub)"
  - "tools/web_providers/ddgs.py          # to vendor in Stage B — moved from plugins/web/ddgs/provider.py (search)"
  - "tools/web_providers/brave_free.py    # to vendor in Stage B — moved from plugins/web/brave_free/provider.py (search; httpx)"
  - "tools/web_providers/searxng.py       # to vendor in Stage B — moved from plugins/web/searxng/provider.py (search; httpx)"
  - "tools/web_providers/tavily.py        # to vendor in Stage B — moved from plugins/web/tavily/provider.py (search + extract; tools.interrupt vendored)"
  # todo tool — SAME pin (revision unchanged):
  - "tools/todo_tool.py                    # per-session task list Operator (id-keyed; merge/replace); durable Store deferred — see ../../docs/design/todo-tool-port.md"

# Upstreams that hermes-agent itself ported code from (preserve their "Ported from" headers):
secondary_origins:
  - {name: opencode,        license: MIT,                                   files: ["tools/fuzzy_match.py", "tools/tool_output_limits.py"]}
  - {name: nearai/ironclaw, license: "MIT (elected; dual MIT/Apache-2.0 upstream)", files: ["agent/redact.py"]}
  - {name: free-code,       license: MIT,                                   files: ["tools/binary_extensions.py"]}

# Deliberately NOT vendored:
cut:
  - "tools/kanban_tools.py  # persistent SQLite todo variant: drags hermes_cli.kanban_db (~7.6k-LOC SQLite); the in-memory todo Operator is vendored instead (docs/design/todo-tool-port.md); kanban's shared-file model doesn't fit calfkit's no-shared-FS deploy"
  - "tools/web_tools.py  # 1347-LOC in-process dispatcher (web_search_tool/web_extract_tool): auxiliary-LLM summarization, legacy backend resolution, Nous managed-gateway routing, secret-redaction, exa/parallel client-cache slots; node re-implements thin orchestration instead"
  - "plugins/web/exa/provider.py  # DEFER (fast-follow): inline `import tools.web_tools` cache-slot indirection raises ImportError at call time; gated on EXA_API_KEY"
  - "plugins/web/parallel/provider.py  # DEFER (fast-follow): same web_tools cache-slot indirection; gated on PARALLEL_API_KEY"
  - "plugins/web/firecrawl/provider.py  # DEFER: 'take whole' drags Nous managed-gateway infra we'll never run"
  - "plugins/web/xai/provider.py  # DEFER: couples to tools.xai_http + config"

local_modifications:
  - "Mechanical import rewrite: tools.* / agent.* / hermes_constants / utils -> calfkit_tools.hermes._vendor.* (most-specific-prefix-wins); app-runtime edges (hermes_cli.* / gateway.* / model_tools / agent.auxiliary_client / agent.lsp.*) -> calfkit_tools.hermes._shims.*"
  - "Authored empty _vendor/agent/__init__.py (upstream's imports jiter_preload, not vendored)"
  - "Manual fix-ups: registry.py importlib f-string root; agent/i18n.py locales path; code_execution_tool.py __file__ PYTHONPATH; agent/skill_utils.py cut-kanban branch"
  - "See ../../docs/design/shell-file-tool-port.md for full rationale + Stage-D (security/multi-tenant) deferral"
  # web_search/web_extract (planned — applied in Stage B; see ../../docs/design/web-search-tool-port.md):
  - "Provider relocation (manual file move, NOT a rewriter op): plugins/web/<name>/provider.py -> _vendor/tools/web_providers/<name>.py for ddgs/brave_free/searxng/tavily; the tools.* target path is chosen so existing rewriter rules (agent.web_search_provider + tavily's tools.interrupt) apply with no new rule"
  - "Authored empty _vendor/tools/web_providers/__init__.py (nothing in the vendored closure imports the providers; the registry doesn't)"
  - "Dropped plugin scaffolding: plugins/web/<name>/__init__.py + plugin.yaml for each provider (their register(ctx) hook needs an un-vendored PluginContext; the node owns its own name->class registration list calling register_provider())"
  # todo (see ../../docs/design/todo-tool-port.md + ../../docs/adr/0003-vendor-hermes-todo-operator-defer-store.md):
  - "tools/todo_tool.py + test_vendored_todo_tool.py: single import rewrite (tools.registry -> calfkit_tools.hermes._vendor.tools.registry); vendored as a stateless Operator — durable per-session Store (Faust table) deferred to the node phase; no shim"
  - "tools/todo_tool.py: ADR-0003 constructor-seed seam — TodoStore.__init__(self, items=None) seeds self._items WITHOUT re-validating (re-running write()/_validate would collapse empty/'?'-id stored items). Sanctioned vendor patch (node phase); captured as the cleanly re-appliable patches/0002-todo-store-constructor-seed.patch (verified `git apply --check` against the verbatim baseline). Not a behavioral change to the Operator — the node seeds via this seam, dispatches with store=, and persists read() back only on writes."
