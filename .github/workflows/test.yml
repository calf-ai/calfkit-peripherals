name: Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: py${{ matrix.python-version }} · calfkit ${{ matrix.calfkit }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
        # Verify both ends of the supported calfkit range (pyproject: >=0.9.0,<0.11):
        # the declared floor (0.9.0, the constraint's exact lower bound) and the current
        # ceiling (0.10.0). The node glue uses only ToolContext / agent_tool / ToolNodeDef,
        # which are identical across both, so a green floor leg is what makes the
        # dual-version support claim honest. Bump these when the floor/ceiling changes.
        calfkit: ["0.9.0", "0.10.0"]

    # python-coverage-comment-action needs ``contents: write`` to commit the
    # badge + coverage data to its data branch
    # (``python-coverage-comment-action-data``) on pushes to main, and
    # ``pull-requests: write`` to post the coverage comment on same-repo PRs.
    # Fork and Dependabot PRs run with a read-only token regardless (GitHub
    # forces this); for those, the action writes a comment artifact that the
    # trusted ``coverage.yml`` workflow posts via ``workflow_run``.
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          # All legs share an identical uv.lock + pyproject, so without a per-leg suffix
          # they collide on one cache key (non-fatal 409 on save). Suffix per leg.
          cache-suffix: py${{ matrix.python-version }}-calfkit${{ matrix.calfkit }}

      - name: Install dependencies
        # uv.lock pins the ceiling (0.10.0); override to the matrix-selected calfkit so each
        # leg exercises a real point in the supported range. The test step uses --no-sync so
        # this pin survives. (matrix.calfkit is a workflow-defined constant, not user input,
        # but it is passed via env per Actions injection-safety best practice.)
        env:
          CALFKIT_VERSION: ${{ matrix.calfkit }}
        run: |
          uv sync --group dev
          uv pip install "calfkit==${CALFKIT_VERSION}"
          # Fail loudly if the pin did not take, rather than silently testing the wrong version.
          installed="$(uv run --no-sync python -c 'import importlib.metadata as m; print(m.version("calfkit"))')"
          echo "calfkit pinned to ${installed} (expected ${CALFKIT_VERSION})"
          test "${installed}" = "${CALFKIT_VERSION}"

      - name: Run tests
        # Coverage is collected on exactly ONE leg (3.11 × ceiling) so there is a single
        # .coverage file for the comment action below; every other leg runs plain pytest.
        # --no-sync preserves the calfkit version pinned in the install step.
        env:
          PYTHON_VERSION: ${{ matrix.python-version }}
          CALFKIT_VERSION: ${{ matrix.calfkit }}
        run: |
          if [ "${PYTHON_VERSION}" = "3.11" ] && [ "${CALFKIT_VERSION}" = "0.10.0" ]; then
            uv run --no-sync pytest tests/ -v --tb=short --cov --cov-report=term-missing
          else
            uv run --no-sync pytest tests/ -v --tb=short
          fi

      - name: Coverage comment
        id: coverage_comment
        # Must match the single coverage-collecting leg above, or the action races (it
        # commits to a data branch + posts one PR comment).
        if: matrix.python-version == '3.11' && matrix.calfkit == '0.10.0'
        uses: py-cov-action/python-coverage-comment-action@v3
        with:
          GITHUB_TOKEN: ${{ github.token }}
          # Thresholds set badge colour only; they do NOT gate CI.
          MINIMUM_GREEN: 90
          MINIMUM_ORANGE: 70

      - name: Store coverage comment (for fork / Dependabot PRs)
        uses: actions/upload-artifact@v7
        if: steps.coverage_comment.outputs.COMMENT_FILE_WRITTEN == 'true'
        with:
          name: python-coverage-comment-action
          path: python-coverage-comment-action.txt
